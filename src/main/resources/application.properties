spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone = -03:00
spring.jpa.open-in-view=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Caching
spring.cache.type=caffeine
spring.cache.cache-names=branches
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=600s

# Virtual Threads
spring.threads.virtual.enabled=true

server.error.whitelabel.enabled=false
server.error.path=/error

spring.datasource.tomcat.initial-size=5
spring.datasource.tomcat.max-wait=20000
spring.datasource.tomcat.max-active=50
spring.datasource.tomcat.max-idle=5
spring.datasource.tomcat.min-idle=0
spring.datasource.tomcat.default-auto-commit=true

spring.profile.default=dev
spring.profiles.active=dev

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
app.security.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://localhost:4000
spring.mvc.problemdetails.enabled=true
server.port=4080
logging.level.org.springframework.security=DEBUG

