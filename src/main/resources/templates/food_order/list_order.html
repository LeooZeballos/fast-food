<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<head th:replace="fragments :: head"><title></title></head>
<body class="bg-secondary bg-gradient">
<div th:replace="fragments :: header"></div>
<div class="container">
    <div class="row">
        <h1 class="col margin-top-bottom-auto">Orders list</h1>
        <div class="col-md-auto margin-top-bottom-auto">
            <a class="btn btn-primary" id="createButton" th:href="@{/food_order/order}">Create new order</a>
        </div>
    </div>
    <div class="row">
        <table class="table table-striped table-dark">
            <thead>
            <tr>
                <th scope="col">Branch</th>
                <th scope="col">State</th>
                <th scope="col">Creation date</th>
                <th scope="col">Payment date</th>
                <th scope="col">Items</th>
                <th scope="col">Total</th>
                <th scope="col">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${listFoodOrders.isEmpty()}">
                <td colspan="8"> No Orders Available </td>
            </tr>
            <tr th:each="order : ${listFoodOrders}">
                <td th:text="${order.branchName}"></td>
                <td th:text="${order.state}"></td>
                <td th:text="${order.formattedCreationTimestamp}"></td>
                <td th:text="${order.formattedPaymentTimestamp}"></td>
                <td th:text="${order.formattedFoodOrderDetails}"></td>
                <td th:text="${order.formattedTotal}"></td>
                <td>
                    <a th:if="${order.state == 'CREATED'}" th:href="@{'/food_order/edit?id=' + ${order.id} + '&action=start_preparation'}" class="btn btn-success btn-sm">Start Preparation</a>
                    <a th:if="${order.state == 'CREATED'}" th:href="@{'/food_order/edit?id=' + ${order.id}}" class="btn btn-warning btn-sm">Update</a>
                    <a th:if="${order.state == 'INPREPARATION'}" th:href="@{'/food_order/edit?id=' + ${order.id} + '&action=finish_preparation'}" class="btn btn-success btn-sm">Finish Preparation</a>
                    <a th:if="${order.state == 'CREATED' || order.state == 'INPREPARATION'}" th:href="@{'/food_order/edit?id=' + ${order.id} + '&action=cancel'}" class="btn btn-danger btn-sm">Cancel</a>
                    <a th:if="${order.state == 'DONE'}" th:href="@{'/food_order/edit?id=' + ${order.id} + '&action=confirm_payment'}" class="btn btn-success btn-sm">Confirm Payment</a>
                    <a th:if="${order.state == 'DONE'}" th:href="@{'/food_order/edit?id=' + ${order.id} + '&action=reject'}" class="btn btn-danger btn-sm">Reject</a>
                    <div th:if="${order.state == 'CANCELLED' || order.state == 'REJECTED' || order.state == 'PAID'}">No actions available</div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div th:replace="fragments :: footer"></div>
<div th:replace="fragments :: scripts"></div>
</body>
</html>
