version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
      - ~/.gemini/google_accounts.json:/home/vscode/.gemini/google_accounts.json
      - ~/.gemini/oauth_creds.json:/home/vscode/.gemini/oauth_creds.json
      - ~/.gemini/settings.json:/home/vscode/.gemini/settings.json
      - ~/.gemini/state.json:/home/vscode/.gemini/state.json
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/fastfood
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - GITHUB_PERSONAL_ACCESS_TOKEN
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devcontainer_network

  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: fastfood
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - devcontainer_network

networks:
  devcontainer_network:

volumes:
  postgres-data:
