version: '3'
services:
  app:
    build: .
    environment:
      - JDBC_DATABASE_URL=jdbc:postgresql://db:5432/fastfood
      - JDBC_DATABASE_USERNAME=postgres
      - JDBC_DATABASE_PASSWORD=postgres
    ports:
      - 8081:8080
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fastfood_network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 5173:80
    depends_on:
      - app
    networks:
      - fastfood_network

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=fastfood
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    volumes:
      - fastfood_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fastfood_network

networks:
  fastfood_network:

volumes:
  fastfood_data:
